version: '3'
tasks:
  up:
    desc: Run the whole stack locally — one wrangler dev per worker, on its own port
    cmds:
      - npx wrangler d1 migrations apply colour --local -c domain/api/wrangler.jsonc
      # Four separate dev processes so each channel has its own port (domain 8787,
      # data-products 8788, web 8789, agent 8790). Wrangler's local dev registry
      # wires the cross-process bindings — service bindings AND queue delivery —
      # so a colour POSTed to the domain flows through to the data-product consumer.
      # Each needs a distinct --inspector-port or they collide on 9229.
      - |
        trap 'kill 0' EXIT
        npx wrangler dev --test-scheduled -c domain/api/wrangler.jsonc --port 8787 --inspector-port 9229 &
        npx wrangler dev --test-scheduled -c platform/data-products/wrangler.jsonc --port 8788 --inspector-port 9230 &
        npx wrangler dev -c experiences/web/wrangler.jsonc --port 8789 --inspector-port 9231 &
        npx wrangler dev -c experiences/agent/wrangler.jsonc --port 8790 --inspector-port 9232 &
        wait

  run:mobile:
    desc: Run the Expo mobile experience against the local domain worker
    dir: experiences/mobile
    cmds:
      - npx expo start

  post:api:
    desc: Perform a simple POST request to the /colours endpoint
    cmds:
      - curl -X POST http://localhost:8787/colours

  typecheck:
    desc: Typecheck every worker + the mobile app against the generated contract types
    cmds:
      - npx tsc -p domain/api
      - npx tsc -p platform/data-products
      - npx tsc -p experiences/web
      - npx tsc -p experiences/agent
      - npx tsc -p experiences/mobile

  test:unit:
    desc: Behaviour-service unit tests (hermetic, in workerd via vitest-pool-workers)
    dir: domain/api
    cmds:
      - npx vitest run tests/unit

  test:integration:
    desc: "Runtime contract conformance: AsyncAPI event + outbox round-trip + spec drift (hermetic, in workerd)"
    dir: domain/api
    cmds:
      - npx vitest run tests/integration

  test:products:
    desc: "Data-product structural conformance against both data contracts (hermetic, in workerd)"
    dir: platform/data-products
    cmds:
      - npx vitest run

  test:agent:
    desc: "Agent MCP tools over the real streamable-http transport (hermetic, in workerd)"
    dir: experiences/agent
    cmds:
      - npx vitest run

  test:conformance:
    desc: OpenAPI request-conformance fuzzing (Schemathesis) against wrangler dev
    cmds:
      - python3 -m pip install --quiet schemathesis
      - npx wrangler d1 migrations apply colour --local -c domain/api/wrangler.jsonc
      - |
        npx wrangler dev -c domain/api/wrangler.jsonc --var RATE_LIMIT:off > /tmp/wrangler-conformance.log 2>&1 &
        DEV_PID=$!
        trap "kill $DEV_PID 2>/dev/null" EXIT
        for i in $(seq 1 60); do curl -sf http://localhost:8787/openapi.json > /dev/null && break; sleep 1; done
        schemathesis run domain/contracts/api/behaviour-service.openapi.yaml --url http://localhost:8787 --exclude-path /events/stream

  ci:
    desc: Lint all three contracts + typecheck, unit, integration and conformance tests
    cmds:
      - task: lint:all
      - task: gen:check
      - task: typecheck
      - task: test:unit
      - task: test:integration
      - task: test:products
      - task: test:agent
      - task: test:conformance

  gen:check:
    desc: Fail if the generated types are stale against the committed contract
    cmds:
      - task: gen:types
      - git diff --exit-code domain/api/types experiences/mobile/src/api

  deploy:
    desc: "Apply remote D1 migrations, then deploy all four workers (domain first, so the others' service bindings resolve). Needs CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID."
    cmds:
      - npx wrangler d1 migrations apply colour --remote -c domain/api/wrangler.jsonc
      - npx wrangler deploy -c domain/api/wrangler.jsonc
      - npx wrangler deploy -c platform/data-products/wrangler.jsonc
      - npx wrangler deploy -c experiences/web/wrangler.jsonc
      - npx wrangler deploy -c experiences/agent/wrangler.jsonc

  bootstrap:cloud:
    desc: One-time creation of the Cloudflare resources (D1, Queue, R2) — paste the D1 id into domain/api/wrangler.jsonc
    cmds:
      - npx wrangler d1 create colour
      - npx wrangler queues create colour-events
      - npx wrangler r2 bucket create colour-data

  lint:openapi:
    desc: Validate the OpenAPI contract (source of truth for the HTTP API)
    sources:
      - domain/contracts/api/behaviour-service.openapi.yaml
    cmds:
      - python3 -m pip install 'openapi-spec-validator' && openapi-spec-validator domain/contracts/api/behaviour-service.openapi.yaml

  lint:asyncapi:
    desc: Lint the AsyncAPI contract (requires asyncapi CLI)
    sources:
      - domain/contracts/api/behaviour-service.asyncapi.yaml
    cmds:
      - npx -y @asyncapi/cli@latest validate domain/contracts/api/behaviour-service.asyncapi.yaml

  lint:datacontract:
    desc: Lint the data-product contracts (requires datacontract CLI)
    sources:
      - domain/contracts/data/colour-operational.contract.yaml
      - domain/contracts/data/colour-performance.contract.yaml
    cmds:
      - python3 -m pip install 'datacontract-cli'
      - datacontract lint domain/contracts/data/colour-operational.contract.yaml
      - datacontract lint domain/contracts/data/colour-performance.contract.yaml

  lint:all:
    desc: Lint the OpenAPI, AsyncAPI and data contracts
    deps: [lint:openapi, lint:asyncapi, lint:datacontract]

  datacontract:test:
    desc: "Real datacontract test against the deployed R2 (post-deploy). Needs DATACONTRACT_S3_* env for a read-only R2 S3 key."
    cmds:
      - python3 -m pip install --quiet 'datacontract-cli[s3]' 'ibis-framework[duckdb]' duckdb
      - datacontract test domain/contracts/data/colour-operational.contract.yaml
      - datacontract test domain/contracts/data/colour-performance.contract.yaml

  gen:types:
    desc: Generate server handler types and the mobile client from the committed OpenAPI contract (one spec, two consumers)
    sources:
      - domain/contracts/api/behaviour-service.openapi.yaml
    cmds:
      - mkdir -p domain/api/types experiences/mobile/src/api
      - npx openapi-typescript domain/contracts/api/behaviour-service.openapi.yaml -o domain/api/types/api.d.ts
      - npx openapi-typescript domain/contracts/api/behaviour-service.openapi.yaml -o experiences/mobile/src/api/schema.ts
