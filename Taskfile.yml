version: '3'
tasks:
  up:
    desc: Run the stack locally (one wrangler dev over every worker config)
    cmds:
      - npx wrangler d1 migrations apply colour --local -c domain/api/wrangler.jsonc
      - npx wrangler dev -c domain/api/wrangler.jsonc --test-scheduled

  post:api:
    desc: Perform a simple POST request to the /colours endpoint
    cmds:
      - curl -X POST http://localhost:8787/colours

  typecheck:
    desc: Typecheck every workspace against the generated contract types
    cmds:
      - npx tsc -p domain/api

  test:unit:
    desc: Behaviour-service unit tests (hermetic, in workerd via vitest-pool-workers)
    dir: domain/api
    cmds:
      - npx vitest run tests/unit

  test:integration:
    desc: "Runtime contract conformance: AsyncAPI event + outbox round-trip + spec drift (hermetic, in workerd)"
    dir: domain/api
    cmds:
      - npx vitest run tests/integration

  test:conformance:
    desc: OpenAPI request-conformance fuzzing (Schemathesis) against wrangler dev
    cmds:
      - python3 -m pip install --quiet schemathesis
      - npx wrangler d1 migrations apply colour --local -c domain/api/wrangler.jsonc
      - |
        npx wrangler dev -c domain/api/wrangler.jsonc > /tmp/wrangler-conformance.log 2>&1 &
        DEV_PID=$!
        trap "kill $DEV_PID 2>/dev/null" EXIT
        for i in $(seq 1 60); do curl -sf http://localhost:8787/openapi.json > /dev/null && break; sleep 1; done
        schemathesis run domain/contracts/api/behaviour-service.openapi.yaml --url http://localhost:8787 --exclude-path /events/stream

  ci:
    desc: Lint all three contracts + typecheck, unit, integration and conformance tests
    cmds:
      - task: lint:all
      - task: gen:check
      - task: typecheck
      - task: test:unit
      - task: test:integration
      - task: test:conformance

  gen:check:
    desc: Fail if the generated types are stale against the committed contract
    cmds:
      - task: gen:types
      - git diff --exit-code domain/api/types experiences/mobile/src/api

  bootstrap:cloud:
    desc: One-time creation of the Cloudflare resources (D1, Queue, R2) — paste the D1 id into domain/api/wrangler.jsonc
    cmds:
      - npx wrangler d1 create colour
      - npx wrangler queues create colour-events
      - npx wrangler r2 bucket create colour-data

  lint:openapi:
    desc: Validate the OpenAPI contract (source of truth for the HTTP API)
    sources:
      - domain/contracts/api/behaviour-service.openapi.yaml
    cmds:
      - python3 -m pip install 'openapi-spec-validator' && openapi-spec-validator domain/contracts/api/behaviour-service.openapi.yaml

  lint:asyncapi:
    desc: Lint the AsyncAPI contract (requires asyncapi CLI)
    sources:
      - domain/contracts/api/behaviour-service.asyncapi.yaml
    cmds:
      - npx -y @asyncapi/cli@latest validate domain/contracts/api/behaviour-service.asyncapi.yaml

  lint:datacontract:
    desc: Lint the data-product contracts (requires datacontract CLI)
    sources:
      - domain/contracts/data/colour-operational.contract.yaml
      - domain/contracts/data/colour-performance.contract.yaml
    cmds:
      - python3 -m pip install 'datacontract-cli'
      - datacontract lint domain/contracts/data/colour-operational.contract.yaml
      - datacontract lint domain/contracts/data/colour-performance.contract.yaml

  lint:all:
    desc: Lint the OpenAPI, AsyncAPI and data contracts
    deps: [lint:openapi, lint:asyncapi, lint:datacontract]

  gen:types:
    desc: Generate server handler types and the mobile client from the committed OpenAPI contract (one spec, two consumers)
    sources:
      - domain/contracts/api/behaviour-service.openapi.yaml
    cmds:
      - mkdir -p domain/api/types experiences/mobile/src/api
      - npx openapi-typescript domain/contracts/api/behaviour-service.openapi.yaml -o domain/api/types/api.d.ts
      - npx openapi-typescript domain/contracts/api/behaviour-service.openapi.yaml -o experiences/mobile/src/api/schema.ts
