name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: arduino/setup-task@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: npm ci
      # The one task agents, developers and CI all run: contract lints →
      # generated-types staleness → typecheck (4 workers + mobile) → unit →
      # integration → data-product + agent suites → Schemathesis vs wrangler dev.
      - name: task ci
        run: task ci

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - uses: arduino/setup-task@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: npm ci
      # Remote D1 migrations, then domain → platform → web → agent so the
      # experiences' service bindings resolve against an already-live domain.
      - name: task deploy
        run: task deploy

  verify:
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUBDOMAIN: ${{ vars.WORKERS_SUBDOMAIN }}
      DATACONTRACT_S3_ACCESS_KEY_ID: ${{ secrets.R2_S3_ACCESS_KEY_ID }}
      DATACONTRACT_S3_SECRET_ACCESS_KEY: ${{ secrets.R2_S3_SECRET_ACCESS_KEY }}
      DATACONTRACT_S3_REGION: auto
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: arduino/setup-task@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke the deployed channels
        run: |
          set -euo pipefail
          DOMAIN="https://colour-behaviour-service.${SUBDOMAIN}.workers.dev"
          PRODUCTS="https://colour-data-products.${SUBDOMAIN}.workers.dev"

          echo "::group::generate three colours"
          for n in 1 2 3; do curl -fsS -X POST "$DOMAIN/colours" | tee -a /tmp/gen.txt; echo; done
          echo "::endgroup::"

          echo "::group::latest reflects a generated colour"
          curl -fsS "$DOMAIN/colours/latest" | grep -qE '"colour":"(red|amber|green)"'
          echo "::endgroup::"

          echo "::group::SSE bridge is live (bounded read within the relay alarm window)"
          # Dump the response headers to a file (not stdout) so the grep can find
          # them; the body streams until -m bounds it, which is expected.
          curl -fsS -N -m 8 "$DOMAIN/events/stream" -D /tmp/sse-headers.txt -o /dev/null || true
          grep -qi 'content-type: text/event-stream' /tmp/sse-headers.txt
          echo "::endgroup::"

          echo "::group::operational product received the events over the queue"
          for i in $(seq 1 30); do
            count=$(curl -fsS "$PRODUCTS/products/colour-operational" | python3 -c "import sys,json;print(len(json.load(sys.stdin)))")
            echo "t=${i}s operational rows=$count"
            [ "$count" -gt 0 ] && break
            sleep 2
          done
          [ "$count" -gt 0 ]
          echo "::endgroup::"

          echo "::group::summariser writes the performance product (Parquet)"
          curl -fsS -X POST "$PRODUCTS/run/summarise" | grep -qE '"rows":[1-9]'
          curl -fsS "$PRODUCTS/products/colour-performance" | python3 -c "import sys,json;d=json.load(sys.stdin);assert d,'empty';print('performance rows',len(d))"
          echo "::endgroup::"
      # The real contract test: datacontract-cli reads both products straight
      # from R2 over its S3 API (endpoint is in each contract) and checks schema
      # + types. Complements the hermetic structural test in `task ci`.
      - name: datacontract test against R2
        run: task datacontract:test
