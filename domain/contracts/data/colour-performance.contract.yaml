dataContractSpecification: 1.2.0
id: urn:outcome-app-pattern:data-product:colour-performance
info:
  title: Colour — Performance & Status
  version: 1.0.0
  description: >
    Purpose: performance of colour generation over time, plus current status at a
    glance. Daily counts per colour let consumers see how colour usage trends and where
    things stand right now. This is the curated data product, produced by the summariser
    from the operational stream and stored as typed, columnar Parquet.
  owner: Data Team
  contact:
    name: Data Team
    email: data@example.com

servers:
  aggregate:
    type: s3
    # Partitioned per day (dt=YYYY-MM-DD/); sealed days are written once, the
    # open window is recomputed each run.
    location: s3://colour-data/colour-performance/**/*.parquet
    endpointUrl: https://f0884fe6c7811fc0e6edc6f6cdcd95bb.r2.cloudflarestorage.com
    format: parquet

models:
  colour_performance:
    description: Count of generated colours per colour per day.
    type: table
    fields:
      date:
        type: string
        description: The day of the aggregation (YYYY-MM-DD).
      colour:
        type: string
        description: The colour being aggregated.
        enum: [red, amber, green]
      count:
        type: integer
        description: The number of events for the colour on the day.

servicelevels:
  frequency:
    description: Recomputed on a regular cadence from the operational stream.
    type: batch
    cron: "0 * * * *"
