openapi: 3.1.0
info:
  title: Colour Behaviour Service
  version: 1.0.0
  description: |
    The source-aligned domain's HTTP contract. This spec is authored and owned
    here as the source of truth; the Workers implementation must conform to it
    (verified by the Schemathesis conformance test and the spec-drift test) and
    both the server's handler types and the experiences' typed client are
    generated from it.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:8787
    description: Local behaviour service (wrangler dev)
paths:
  /colours:
    post:
      operationId: createColour
      summary: Generate a colour
      description: |
        Generate a colour, persist it, and enqueue a colour.generated event.

        When Cloudflare Access is provisioned, the write requires a valid Access
        identity JWT (`Cf-Access-Jwt-Assertion`, or a bearer token for native /
        direct callers). First-party channels forward the caller's token over
        their service binding. Auth is config-gated: unset in the demo, the
        endpoint is open. Reads and the SSE feed are unauthenticated.

        Not marked as an unconditional `security` requirement because enforcement
        is conditional: config-gated (off until Access is provisioned) and
        transport-dependent (first-party service-binding callers are trusted
        without a token). The `accessJwt` / `bearerAuth` schemes below document
        the credential a direct caller presents; the 401 documents the failure.
      responses:
        "200":
          description: The generated colour.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColourEvent"
        "401":
          description: Missing or invalid Access token (only when Access is provisioned).
        "429":
          description: Rate limited — too many colour generations. Retry after the Retry-After interval.
    get:
      operationId: colourHistory
      summary: Recent colours (most recent first)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Recent colours, most recent first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ColourEvent"
        "422":
          description: Invalid query parameter.
  /colours/latest:
    get:
      operationId: latestColour
      summary: The most recently generated colour
      responses:
        "200":
          description: The latest colour.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColourEvent"
        "404":
          description: No colours generated yet.
  /events/stream:
    get:
      operationId: eventsStream
      summary: Server-Sent Events feed of colour.generated events
      description: |
        Long-lived text/event-stream. Consumed by browser EventSource, the
        mobile app, and the agent. Excluded from request-conformance fuzzing
        because it never terminates.
      responses:
        "200":
          description: An SSE stream of colour payloads.
          content:
            text/event-stream:
              schema:
                type: string
components:
  securitySchemes:
    accessJwt:
      type: apiKey
      in: header
      name: Cf-Access-Jwt-Assertion
      description: |
        Cloudflare Access identity JWT. Injected by Access at the edge for
        browser flows and forwarded by first-party channels over their service
        binding. Validated in-Worker against the team's public JWKS.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        The same Access JWT presented as a bearer token — used by native (mobile)
        and direct API callers that can't rely on the edge-injected header.
  schemas:
    ColourEvent:
      type: object
      required:
        - colour
        - timestamp
      properties:
        colour:
          type: string
          enum: [red, amber, green]
        timestamp:
          type: string
          format: date-time
